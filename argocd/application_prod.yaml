apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: messenger-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/Serror16/lab-k8s-messager"
    targetRevision: HEAD
    path: k8s/overlays/prod
  destination:
    server: "https://kubernetes.default.svc"
    namespace: messenger-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true