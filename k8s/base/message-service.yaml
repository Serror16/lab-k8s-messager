apiVersion: apps/v1
kind: Deployment
metadata:
  name: message-service
spec:
  selector:
    matchLabels:
      app: message-service
  template:
    metadata:
      labels:
        app: message-service
    spec:
      containers:
      - name: message-service
        image: mablinov2704/message-service:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        env:
        - name: HTTP_PORT
          value: "8080"
        - name: UPLOADS_DIR
          value: "/uploads"
        - name: DB_DSN
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: MSG_DB_DSN
        volumeMounts:
        - name: s3-data
          mountPath: /uploads
      volumes:
      - name: s3-data
        persistentVolumeClaim:
          claimName: s3-pvc
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: workload
                operator: In
                values:
                - app
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: disk
                operator: In
                values:
                - fast

---
apiVersion: v1
kind: Service
metadata:
  name: message-service
spec:
  selector:
    app: message-service
  ports:
  - port: 8080
    targetPort: 8080